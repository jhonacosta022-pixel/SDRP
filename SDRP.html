<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDRP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.85)),
    url("https://media.discordapp.net/attachments/1500407119399358615/1504440748475678824/image.png?ex=6a2c91e1&is=6a2b4061&hm=e1ef4debe5eb6077bcf530a687c95205e7bf994b4af29ef15b546d13277cf0c0&=&format=webp&quality=lossless&width=975&height=650");
    background-size:cover;
    background-position:center;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
    background:rgba(15,15,15,.95);
    border:2px solid #ff0000;
    border-radius:20px;
    padding:50px;
    box-shadow:0 0 30px rgba(255,0,0,.4);
}

.logo{
    font-size:70px;
    margin-bottom:15px;
}

h1{
    color:#ff0000;
    font-size:50px;
    letter-spacing:3px;
    margin-bottom:10px;
}

.line{
    width:150px;
    height:4px;
    background:#ff0000;
    margin:15px auto;
}

p{
    color:#d1d5db;
    font-size:18px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#ff0000;
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    transition:.3s;
}

.btn:hover{
    background:#cc0000;
    transform:scale(1.05);
    box-shadow:0 0 20px red;
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">📝</div>

    <h1>SDRP</h1>

    <div class="line"></div>

    <p>
        Sistema Oficial de Gestión y Administración.
        Accede al panel principal de manera rápida y segura.
    </p>

    <a class="btn"
       href="https://jhonacosta022-pixel.github.io/STDMRP/"
       target="_blank">
       INGRESAR AL SISTEMA
    </a>

    <div class="footer">
        © Santo Domingo Roleplay - Todos los derechos reservados
    </div>

</div>

</body>
</html>
